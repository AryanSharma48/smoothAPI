name: Release

# Trigger the workflow on pushes to tags starting with 'v' (e.g., v1.0.0, v2.1.3-beta)
on:
  push:
    tags:
      - 'v*'

jobs:
  # Job 1: Run the TypeScript tests and build to ensure code quality before release
  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install sandbox dependencies
        working-directory: ./sandbox
        run: npm install
        
      - name: Start sandbox server
        working-directory: ./sandbox
        run: node server.js &
        
      - name: Wait for sandbox server
        run: |
          # Wait up to 10 seconds for the server to be ready
          for i in {1..10}; do
            curl -s -f http://localhost:3001/health > /dev/null && break || sleep 1
          done
          
      - name: Install TypeScript package dependencies
        working-directory: ./packages/smooth-api-ts
        run: npm install
        
      - name: Build and Test TypeScript package
        working-directory: ./packages/smooth-api-ts
        run: |
          npm run build
          npm test

  # Job 2: Run Python tests to ensure the Python package is also fully functional before release
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js (for sandbox server)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install sandbox dependencies
        working-directory: ./sandbox
        run: npm install
        
      - name: Start sandbox server
        working-directory: ./sandbox
        run: node server.js &
        
      - name: Wait for sandbox server
        run: |
          for i in {1..10}; do
            curl -s -f http://localhost:3001/health > /dev/null && break || sleep 1
          done
          
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Python package dependencies
        working-directory: ./packages/smooth-api-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run Python tests
        working-directory: ./packages/smooth-api-py
        run: pytest tests/ -v

  # Job 3: Automatically create a GitHub Release after all checks/tests pass successfully
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Wait for both TS and Python tests to pass
    needs: [typescript-tests, python-tests]
    
    # Require explicit permission to write to repository contents (releases and tags)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the built-in token provided by GitHub Actions
          token: ${{ secrets.GITHUB_TOKEN }}
          # The tag name pushed, e.g., v1.0.0
          tag_name: ${{ github.ref_name }}
          # The name of the release (same as the tag)
          name: ${{ github.ref_name }}
          # Enable automatic generation of release notes based on commit history
          generate_release_notes: true
          # Set draft and prerelease status
          draft: false
          prerelease: false
