[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "smooth-api"
version = "0.1.0"
description = "API resilience library — exponential backoff and circuit breaker"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["resilience", "circuit-breaker", "retry", "backoff", "http"]
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "pytest-asyncio>=0.21",
  "requests>=2.28",
  "httpx>=0.24",
]

[tool.hatch.build.targets.wheel]
packages = ["smooth_api"]
