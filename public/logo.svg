<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="auto">
  <defs>
    <!-- Emerald Red / Rich Gemstone Crimson Gradient -->
    <linearGradient id="grad-emerald-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#9f1239" />
    </linearGradient>
  </defs>

  <!-- Centered Styled Text -->
  <text x="400" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="104" font-weight="900" letter-spacing="-3px" text-anchor="middle">
    <tspan fill="#ffffff">Smooth</tspan><tspan fill="url(#grad-emerald-red)">API</tspan>
  </text>
</svg>
